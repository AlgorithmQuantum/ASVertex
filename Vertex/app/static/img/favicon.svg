<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Degradado idéntico al de la imagen -->
    <linearGradient id="vertexGrad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#9333EA" /> <!-- Morado -->
      <stop offset="100%" stop-color="#10B981" /> <!-- Verde esmeralda -->
    </linearGradient>
  </defs>
  
  <g fill="none" stroke="url(#vertexGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- Estructura principal (Las patas de la "A") -->
    <path d="M 22 85 L 50 15 L 78 85" />
    
    <!-- Espina central y trazo dinámico que rompe hacia la izquierda -->
    <path d="M 50 15 L 50 55 L 12 70" />
    
    <!-- Conexión interna derecha para cerrar el efecto 3D -->
    <path d="M 50 55 L 70 65" />
  </g>
</svg>
